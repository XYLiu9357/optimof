version: "3"

env:
  MAIN: src/main.py
  EXTRACT_FEATURES: src/model_features/extract_all.py
  MPI_EXTRACT_FEATURES: src/model_features/mpi_extract_all.py
  COMPILER: /usr/bin/clang++
  DEBUG_FLAGS: -g -Wall -fsanitize=address

tasks:
  default:
    - task: train-thermal

  # Feature extraction
  extract-all:
    cmds:
      - python ${EXTRACT_FEATURES} {{.CLI_ARGS}}
      - task: check-features

  mpi-extract-all:
    cmds:
      - python ${MPI_EXTRACT_FEATURES} {{.CLI_ARGS}}
      - task: check-features

  extract-feature:
    cmds:
      - python src/model_features/feature_extraction.py {{.CLI_ARGS}}

  check-features:
    cmds:
      - python data/check_features.py

  # Model training and testing
  train-thermal:
    cmds:
      - python src/model_training/thermal_model.py

  test-thermal:
    cmds:
      - python src/model_training/thermal_model_test.py

  train-solvent:
    cmds:
      - python src/model_training/solvent_model.py

  test-solvent:
    cmds:
      - python src/model_training/solvent_model_test.py

  # zeo++ library
  compile-zeo:
    cmds:
      - task: clean-zeo
      - (cd zeo++-0.3/voro++/src && make)
      - (cd zeo++-0.3 && make)

  clean-zeo:
    cmds:
      - (cd zeo++-0.3/voro++/src && make clean)
      - (cd zeo++-0.3 && make clean)

  # Clean
  clean-temp:
    cmds:
      - rm -r temp_* || true
