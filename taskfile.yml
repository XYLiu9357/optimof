version: "3"

env:
  MAIN: src/main.py
  EXTRACT_FEATURES: src/model_features/extract_all.py

tasks:
  default:
    - task: extract-all

  # Feature extraction script
  extract-all:
    cmds:
      - python ${EXTRACT_FEATURES} {{.CLI_ARGS}}
      - task: check-features

  extract-feature:
    cmds:
      - python src/model_features/feature_extraction.py {{.CLI_ARGS}}

  check-features:
    cmds:
      - python data/check_features.py

  # Recompile zeo++ library (may resolve system compatibility issues)
  compile-zeo:
    cmds:
      - task: clean-zeo
      - echo "Compiling zeo++, this may take some time..."
      - (cd zeo++-0.3/voro++/src && make)
      - (cd zeo++-0.3 && make)
      - echo "Compilation completed"

  clean-zeo:
    cmds:
      - echo "Cleaning existing zeo++ build..."
      - (cd zeo++-0.3/voro++/src && make clean)
      - (cd zeo++-0.3 && make clean)
      - echo "Existing zeo++ build removed."

  # Clean temp folders
  clean-temp:
    cmds:
      - rm -r temp_* || true
